# ALL CREDIT GOES TO SEIZURE AXEL MANGUIAN CURLING TOES SIMULATION
services:
  web:
    build: .
    volumes:
     - .:/app
     - /app/.venv
    ports:
     - "8000:8000"
    environment:
     - DATABASE_URL=${DATABASE_URL}
    depends_on:
     - db
  
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: